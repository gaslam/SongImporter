name: Windows GUI Release
on: [pull_request]

    
            
env:
  QT_VERSION: "6.10.1"
  SOURCE_DIR: ${{ github.workspace }}
  BUILD_TYPE: Release
  BUILD_FOLDER: ${{ github.workspace }}/build
defaults:
  run:
   shell: pwsh

jobs:
  build:
    runs-on: windows-2025
    

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Create dir
      run: |
        mkdir ${{env.BUILD_FOLDER}}

               
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        aqtversion: '==3.3.*'
        version: ${{env.QT_VERSION}}
        host: 'windows'
        target: 'desktop'
        arch: 'win64_mingw'
        modules: 'qt5compat'
        install-deps: true
        dir: "${{env.SOURCE_DIR}}/qt"
        cache: 'true'
        cache-key-prefix: qt-${{ runner.os }}-${{ env.QT_VERSION }}-msvc2022


    - name: Configure CMake Project
      working-directory: ${{env.SOURCE_DIR}}
      #song importer path will get fixed. {{ github.workspace }} uses \ which causes errors when building
      run: cmake -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}  -G "MinGW Makefiles" -B ${{env.BUILD_FOLDER}} -DZLIB_INCLUDE_DIR="${{ github.workspace }}\thirdparty\zlib\include" -DZLIB_LIBRARY="${{ github.workspace }}\thirdparty\zlib\lib\libz.dll.a" -DQuaZip-Qt6_DIR="${{ github.workspace }}\thirdparty\quazip\lib\cmake\QuaZip-Qt6-1.5"
      
    - name: Build project
      run: cmake --build ${{env.BUILD_FOLDER}} --config ${{ env.BUILD_TYPE }}
      
    - name: Analyse QML
      shell: powershell
      run: |
        Get-ChildItem -Path "${{ github.workspace }}/SongImporterGui" -Recurse -Filter *.qml | ForEach-Object {
          Write-Host "Linting $($_.FullName)"
          qmllint $_.FullName
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        }
