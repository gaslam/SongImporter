name: Windows GUI Release
on: [push, pull_request, workflow_dispatch]

    
            
env:
  QT_VERSION: "6.10.1"
  BUILD_TYPE: Release
  BUILD_DIR: build

jobs:
  build:
    runs-on: windows-2025
    steps:
    - uses: actions/checkout@v2
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
          python-version: "3.11"
        
    - name: Install Qt 6.10.1 (MinGW)
      run: |
          python -m pip install --upgrade pip
          pip install aqtinstall
          aqt install-qt windows desktop 6.10.1 win64_mingw -O C:\Qt
          aqt install-tool windows desktop tools_mingw1310 -O C:\Qt
          
    - name: Setup Qt environment
      shell: powershell
      run: |
          echo "C:\Qt\6.10.1\mingw_64\bin" >> $env:GITHUB_PATH
          echo "C:\Qt\Tools\mingw1310_64\bin" >> $env:GITHUB_PATH


    - name: Configure CMake
      shell: powershell
      run: |
        cmake -S . -B build `
          -G "MinGW Makefiles" `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="C:\Qt\6.10.1\mingw_64"

    - name: Build project
      run: |
          cmake --build ${{ env.BUILD_DIR }} --config ${{ env.BUILD_TYPE }}

    - name: QML lint (Main.qml)
      run: |
        qmllint --warnings-as-errors SongImporterGui/Main.qml 

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
          name: qt-app-windows
          path: ${{ env.BUILD_DIR }}
