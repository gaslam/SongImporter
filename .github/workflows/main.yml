name: Windows GUI Release
on: [push, pull_request, workflow_dispatch]

    
            
env:
  QT_VERSION: "6.10.1"
  SOURCE_DIR: ${{ github.workspace }}
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: windows-2025

    steps:
    - name: Checkout repo
      uses: actions/checkout@v2
      with:
        submodules: recursive
               
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        aqtversion: '==3.3.*'
        version: ${{env.QT_VERSION}}
        host: 'windows'
        target: 'desktop'
        arch: 'win64_mingw'
        install-deps: true
        dir: "${{env.SOURCE_DIR}}/qt"

    - name: Configure CMake Project
      working-directory: SOURCE_DIR
      env:
        CMAKE_PREFIX_PATH: ${{env.Qt6_Dir}}
      run: cmake -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -G "MinGW Makefiles" -B ${{env.SOURCE_DIR}}/build
