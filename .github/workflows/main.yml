name: Windows GUI Release
on: [push, pull_request, workflow_dispatch]

    
            
env:
  QT_VERSION:     "6.10.1"
  MINGW_VERSION:  "win64_mingw81"
  MINGW_PATH:     "mingw81_64"
  BUILD_TYPE:      Release

jobs:
  build:
    runs-on: windows-2025
    steps:
    - uses: actions/checkout@v2

    - name: Install correct version of mingw
      uses: crazy-max/ghaction-chocolatey@v1
      with:
        args: install mingw --version=8.1.0  -y
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
          python-version: "3.11"
        
    - name: Install Qt 6.10.1 (MinGW)
      run: |
          python -m pip install --upgrade pip
          pip install aqtinstall

          aqt install-qt windows desktop 6.10.1 win64_mingw -O C:\Qt
