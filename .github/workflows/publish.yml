name: Windows Deployment
on:
  pull_request:
    branches:
      - main
      # keep this for now
      - dev

jobs:
 build:
   uses: ./.github/workflows/main.yml
 deploy:
  needs: build
  runs-on: windows-2025
  steps:
   - run: echo "${{ needs.build.outputs.build_type }}"
   - run: echo "${{ needs.build.outputs.build_folder }}"
   - name: "Make deploy folder"
     run: |
       mkdir deploy
