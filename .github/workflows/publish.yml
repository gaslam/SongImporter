name: Windows Deployment
on:
  pull_request:
    branches:
      - main
      # keep this for now
      - dev

jobs:
 build:
   uses: ./.github/workflows/main.yml
 deploy:
  needs: build
  runs-on: windows-2025
  steps:
   - name: "Make deploy folder"
     run: |
       mkdir deploy
       Move-Item ${{needs.build.outputs.build_folder}}/out/${{needs.build.outputs.build_type}}/SongImporterGui/appSongImporterGui.exe -Path -Destination ./deploy/appSongImporterGui.exe
