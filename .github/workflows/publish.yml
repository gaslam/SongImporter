name: Windows Deployment
on:
  pull_request:
    branches:
      - main
      # keep this for now
      - dev

jobs:
 build:
   uses: ./.github/workflows/main.yml
 deploy:
  needs: build
  runs-on: windows-2025
  steps:
  - name: Download artifact
    uses: actions/download-artifact@v4
    with:
     name: workspace-folder
     path: artifacts
          
  - name: "Make deploy folder"
    run: |
      mkdir deploy
      Move-Item -Path artifacts/build/SongImporterGui/Release/appSongImporterGui.exe -Destination ./deploy/appSongImporterGui.exe
      
  - name: "Configure exe"
    run: |
      windeployqt
